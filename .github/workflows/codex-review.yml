# Codex PR-review loop.
# Robot that wakes up on two events and runs OpenAI Codex:
#   1. A pull request is opened/updated  -> Codex reviews the diff.
#   2. Someone comments "@codex ..."      -> Codex acts (e.g. fixes issues).
name: Codex review

on:
  # Review half: fires whenever a PR is opened or new commits are pushed to it.
  pull_request:
    types: [opened, synchronize, reopened]
  # Fix half: fires on every new comment; we filter to "@codex" comments below.
  issue_comment:
    types: [created]

# What the workflow is allowed to do in the repo.
permissions:
  contents: write        # let Codex push a fix commit
  pull-requests: write   # let it post review comments

jobs:
  # ---------------------------------------------------------------------------
  # REVIEW: runs only for pull_request events. Reads the diff, posts a review.
  # ---------------------------------------------------------------------------
  review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      # Pull the repo code onto the runner so Codex can see the diff.
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0   # full history so the base..head diff is available

      # Run Codex on the diff. Its text answer comes back as `final-message`.
      - id: codex
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt: |
            Review this pull request's diff against the base branch.
            Follow the "Review guidelines" section in AGENTS.md.
            Report ONLY P0 (critical) and P1 (important) issues.
            If there are none, say "No P0/P1 issues found." Be concise.

      # Post Codex's answer as a comment on the PR.
      - uses: actions/github-script@v7
        with:
          script: |
            const body = "### 🤖 Codex review\n\n" + ${{ toJSON(steps.codex.outputs['final-message']) }};
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });

  # ---------------------------------------------------------------------------
  # FIX: runs only when a human comments "@codex ..." on a PR (not on issues,
  # and never on the bot's own comments). Codex can push a fix to the branch.
  # ---------------------------------------------------------------------------
  fix:
    if: >
      github.event_name == 'issue_comment' &&
      github.event.issue.pull_request &&
      startsWith(github.event.comment.body, '@codex') &&
      github.event.comment.user.type != 'Bot'
    runs-on: ubuntu-latest
    steps:
      # Check out the PR's branch so Codex edits the right code.
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      # Move HEAD onto the PR branch (issue_comment checks out the default branch).
      - name: Check out PR branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr checkout ${{ github.event.issue.number }}

      # Hand the human's comment to Codex as the instruction; let it apply changes.
      - id: codex
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt: |
            A maintainer left this instruction on the PR:
            "${{ github.event.comment.body }}"
            Make the requested change in the working tree. Keep it minimal.

      # Commit and push whatever Codex changed, if anything.
      - name: Commit and push fix
        run: |
          git config user.name "codex-bot"
          git config user.email "codex-bot@users.noreply.github.com"
          if [ -n "$(git status --porcelain)" ]; then
            git add -A
            git commit -m "Codex: apply requested change"
            git push
          else
            echo "No changes to push."
          fi
